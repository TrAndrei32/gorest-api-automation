name: Test JSONPlaceholder Access

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Test JSONPlaceholder
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://jsonplaceholder.typicode.com/users)
          echo "Status code: $response"
          if [ "$response" == "200" ]; then
            echo "JSONPlaceholder este accesibil!"
          else
            echo "JSONPlaceholder este BLOCAT! Status: $response"
          fi